    <div class="singup-card">
    <h2>Krijo Llogari</h2>
<label for="username">Username</label>
<input type="text" id="username" placeholder="Shkruaj username-in">
<span class="error" id="username-error"></span>

<label for="email">Email</label>
<input type="email" id="email" placeholder="Shkruaj email-in">
<span class="error" id="email-error"></span>

<label for="phone">Numri i Telefonit</label>
<input type="tel" id="phone" placeholder="Shkruaj numrin e telefonit">
<span class="error" id="phone-error"></span>

<label for="password">Fjalëkalimi</label>
<input type="password" id="password" placeholder="Shkruaj fjalëkalimin">
<span class="error" id="password-error"></span>

<label for="confirm-password">Konfirmo Fjalëkalimin</label>
<input type="password" id="confirm-password" placeholder="Përsërit fjalëkalimin">
<span class="error" id="confirm-password-error"></span>

<button type="button" onclick="validateSignup()">Regjistrohu</button>
</div>
