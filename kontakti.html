<section class="contact-section">

    <div class="contact-info">
        <h2>Informacion</h2>
        <p><strong>Adresa:</strong> Prishtinë</p>
        <p><strong>Telefoni:</strong> +383 44 123 456</p>
        <p><strong>Email:</strong> info@smilecare.com</p>
    </div>

    <div class="contact-form">
        <h2>Dërgo mesazh</h2>
       <form>
    <input type="text" id="name" placeholder="Emri">
    <span class="error" id="name-error"></span>

    <input type="email" id="email" placeholder="Email">
    <span class="error" id="email-error"></span>

    <input type="text" id="subject" placeholder="Subjekti">
    <span class="error" id="subject-error"></span>

    <textarea rows="4" id="message" placeholder="Mesazhi"></textarea>
    <span class="error" id="message-error"></span>

    <button type="button" onclick="validateContact()">Dërgo</button>
</form>

    </div>

</section>
